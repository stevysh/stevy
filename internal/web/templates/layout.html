<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{if .Title}}{{.Title}} — Stevy{{else}}Stevy{{end}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      color: #24292f;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #d0d7de;
      box-shadow: 0 1px 0 rgba(27, 31, 36, 0.04);
    }
    header .inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      min-height: 52px;
    }
    header .left {
      display: flex;
      align-items: stretch;
      gap: 24px;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
    }
    header h1 a { color: inherit; text-decoration: none; }
    header nav {
      display: flex;
      gap: 4px;
      align-items: stretch;
    }
    header nav a {
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 14px;
      color: #57606a;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    header nav a:hover { color: #24292f; }
    header nav a.active {
      color: #0969da;
      border-bottom-color: #0969da;
    }
    header .user-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #24292f;
    }
    header .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #eaeef2;
      color: #57606a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    header a.logout {
      color: #57606a;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    header a.logout:hover {
      background: #f6f8fa;
      color: #24292f;
    }
    main {
      max-width: 1200px;
      margin: 20px auto 32px;
      padding: 0 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    h2 { font-size: 18px; margin: 0 0 16px; }
    .row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .row input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      padding: 8px 16px;
      background: #1f883d;
      color: #fff;
      border: 0;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button.secondary { background: #fff; color: #24292f; border: 1px solid #d0d7de; }
    button.danger { background: #cf222e; padding: 4px 10px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #d8dee4; }
    th { color: #57606a; font-weight: 500; background: #f6f8fa; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    table.compact td, table.compact th { padding: 6px 10px; }
    table a { color: #0969da; text-decoration: none; }
    table a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-available  { background: #ddf4ff; color: #0550ae; }
    .badge-pending    { background: #ddf4ff; color: #0550ae; }
    .badge-scheduled  { background: #f1f8ff; color: #57606a; }
    .badge-running    { background: #fff8c5; color: #7d4e00; }
    .badge-retryable  { background: #fff1e0; color: #953800; }
    .badge-completed  { background: #dafbe1; color: #116329; }
    .badge-discarded  { background: #ffebe9; color: #82071e; }
    .badge-cancelled  { background: #eaeef2; color: #57606a; }
    .pause-form { display: inline; margin: 0; }
    .muted { color: #57606a; }
    .plaintext-key {
      background: #fff8c5;
      border: 1px solid #d4a72c;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <div class="left">
        <h1><a href="/">Stevy</a></h1>
        <nav>
          <a href="/"       {{if eq .ActiveTab "jobs"}}class="active"{{end}}>Jobs</a>
          <a href="/queues"   {{if eq .ActiveTab "queues"}}class="active"{{end}}>Queues</a>
          <a href="/workers" {{if eq .ActiveTab "workers"}}class="active"{{end}}>Workers</a>
          <a href="/keys"    {{if eq .ActiveTab "keys"}}class="active"{{end}}>API Keys</a>
        </nav>
      </div>
      <div class="user-info">
        <span class="user">
          <span class="avatar">{{slice .User.Email 0 1}}</span>
          {{.User.Email}}
        </span>
        <a class="logout" href="/auth/logout">Logout</a>
      </div>
    </div>
  </header>

  <main>
    {{template "content" .}}
  </main>
</body>
</html>
