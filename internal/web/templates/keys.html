{{define "content"}}
<div class="card">
  <h2>Create API Key</h2>
  <div class="row">
    <input id="label" placeholder="Label (e.g. 'my-app-prod')">
    <button onclick="createKey()">Create</button>
  </div>
  <div id="newKey"></div>
</div>

<div class="card">
  <h2>API Keys</h2>
  <table id="keysTable">
    <thead>
      <tr>
        <th>Label</th>
        <th>Prefix</th>
        <th>Created</th>
        <th>Last used</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  async function loadKeys() {
    const res = await fetch('/keys/list');
    const keys = await res.json() || [];
    const tbody = document.querySelector('#keysTable tbody');
    tbody.innerHTML = keys.map(k => `
      <tr>
        <td>${escape(k.Label)}</td>
        <td><code>${escape(k.KeyPrefix)}...</code></td>
        <td>${new Date(k.CreatedAt).toLocaleDateString()}</td>
        <td>${k.LastUsedAt ? new Date(k.LastUsedAt).toLocaleString() : '—'}</td>
        <td><button class="danger" onclick="deleteKey(${k.ID})">Revoke</button></td>
      </tr>
    `).join('') || '<tr><td colspan="5" style="color:#57606a">No client keys yet.</td></tr>';
  }

  async function createKey() {
    const label = document.getElementById('label').value.trim();
    if (!label) { alert('Label is required'); return; }
    const res = await fetch('/keys', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label, role: 'client' }),
    });
    if (!res.ok) { alert('Error: ' + await res.text()); return; }
    const data = await res.json();
    document.getElementById('newKey').innerHTML = `
      <div class="plaintext-key">
        <strong>Save this client key now — it won't be shown again:</strong><br>
        <code>${escape(data.key)}</code>
      </div>`;
    document.getElementById('label').value = '';
    loadKeys();
  }

  async function deleteKey(id) {
    if (!confirm('Revoke this key?')) return;
    await fetch('/keys/' + id, { method: 'DELETE' });
    loadKeys();
  }

  function escape(s) { return String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

  loadKeys();
</script>
{{end}}
