syntax = "proto3";

package stevy.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/stevysh/stevy/gen/stevy/v1;stevyv1";

message QueueStats {
  int32 pending = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 scheduled = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 available = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 running = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 retryable = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 cancelled = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 discarded = 8 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 completed = 9 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
}

message Queue {
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
      min_len: 1
      max_len: 64
    }
  ];
  bool paused = 2 [(buf.validate.field).required = true];
  QueueStats stats = 3 [(buf.validate.field).required = true];
}

message GetQueueRequest {
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
      min_len: 1
      max_len: 64
    }
  ];
}

message GetQueueResponse {
  Queue queue = 1 [(buf.validate.field).required = true];
}

message ListQueuesRequest {}

message ListQueuesResponse {
  repeated Queue queues = 1;
}

message PauseQueueRequest {
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
      min_len: 1
      max_len: 64
    }
  ];
}
message PauseQueueResponse {}

message ResumeQueueRequest {
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
      min_len: 1
      max_len: 64
    }
  ];
}
message ResumeQueueResponse {}

service QueueService {
  rpc ListQueues(ListQueuesRequest) returns (ListQueuesResponse) {
    option (google.api.http) = {get: "/v1/queues"};
  }
  rpc GetQueue(GetQueueRequest) returns (GetQueueResponse) {
    option (google.api.http) = {
      get: "/v1/queues/{name}"
      response_body: "queue"
    };
  }
  rpc PauseQueue(PauseQueueRequest) returns (PauseQueueResponse) {
    option (google.api.http) = {
      post: "/v1/queues/{name}/pause"
      body: "*"
    };
  }
  rpc ResumeQueue(ResumeQueueRequest) returns (ResumeQueueResponse) {
    option (google.api.http) = {
      post: "/v1/queues/{name}/resume"
      body: "*"
    };
  }
}
