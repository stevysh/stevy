syntax = "proto3";

package stevy.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/stevysh/stevy/gen/stevy/v1;stevyv1";

message AttemptError {
  google.protobuf.Timestamp at = 1 [(buf.validate.field).required = true];
  string message = 2 [(buf.validate.field).required = true];
}

message Job {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
  string queue = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
      min_len: 1
      max_len: 64
    }
  ];
  string kind = 3 [(buf.validate.field).required = true];
  string status = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      in: [
        "pending",
        "scheduled",
        "available",
        "running",
        "retryable",
        "cancelled",
        "discarded",
        "completed"
      ]
    }
  ];
  int32 attempt = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 progress = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 100
    }
  ];
  google.protobuf.Struct payload = 4;
  google.protobuf.Struct result = 8;
  repeated AttemptError errors = 9;
  google.protobuf.Timestamp created_at = 10 [(buf.validate.field).required = true];
  google.protobuf.Timestamp scheduled_at = 11 [(buf.validate.field).required = true];
  google.protobuf.Timestamp attempted_at = 12;
  google.protobuf.Timestamp finalized_at = 13;
}

message CreateJobRequest {
  string queue = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
      min_len: 1
      max_len: 64
    }
  ];
  string kind = 2 [(buf.validate.field).required = true];
  google.protobuf.Struct payload = 3;
  JobOptions options = 4;
}

message JobOptions {
  bool pending = 1;
  int64 delay = 2 [(buf.validate.field).int64 = {gte: 0}]; // milliseconds
  int32 attempts = 3 [(buf.validate.field).int32 = {gte: 0}];
  int32 priority = 4 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  BackoffOptions backoff = 5;
}

message BackoffOptions {
  string type = 1 [(buf.validate.field).string = {
    in: [
      "fixed",
      "exponential"
    ]
  }];
  int64 delay = 2 [(buf.validate.field).int64 = {gte: 0}];
  bool jitter = 3;
}

message CreateJobResponse {
  Job job = 1 [(buf.validate.field).required = true];
}

message ClaimJobRequest {
  string queue = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
      min_len: 1
      max_len: 64
    }
  ];
}

message ClaimJobResponse {
  Job job = 1 [(buf.validate.field).required = true];
}

message CompleteJobRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
  google.protobuf.Struct result = 2;
}
message CompleteJobResponse {}

message FailJobRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
  string message = 2 [(buf.validate.field).required = true];
}
message FailJobResponse {}

message HeartbeatJobRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
  optional int32 progress = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
}
message HeartbeatJobResponse {}

message CancelJobRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
}
message CancelJobResponse {}

message PromoteJobRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
}
message PromoteJobResponse {}

message ListJobsRequest {
  optional string status = 1 [(buf.validate.field).string = {
    in: [
      "pending",
      "scheduled",
      "available",
      "running",
      "retryable",
      "cancelled",
      "discarded",
      "completed"
    ]
  }];
  optional string queue = 2 [(buf.validate.field).string = {
    pattern: "^[a-z0-9]+(?:[_-][a-z0-9]+)*$"
    min_len: 1
    max_len: 64
  }];
  optional int32 limit = 3 [(buf.validate.field).int32 = {
    gte: 1
    lte: 250
  }];
  optional string after = 4 [(buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"];
}

message ListJobsResponse {
  repeated Job jobs = 1;
}

message GetJobRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
}
message GetJobResponse {
  Job job = 1 [(buf.validate.field).required = true];
}

message GetJobStateRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
}
message GetJobStateResponse {
  string status = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      in: [
        "pending",
        "scheduled",
        "available",
        "running",
        "retryable",
        "cancelled",
        "discarded",
        "completed"
      ]
    }
  ];
  int32 progress = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  optional string error = 3;
}

service JobService {
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/v1/jobs"
      response_body: "jobs"
    };
  }
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse) {
    option (google.api.http) = {
      post: "/v1/jobs"
      body: "*"
      response_body: "job"
    };
  }
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {
    option (google.api.http) = {
      get: "/v1/jobs/{id}"
      response_body: "job"
    };
  }
  rpc GetJobState(GetJobStateRequest) returns (GetJobStateResponse) {
    option (google.api.http) = {get: "/v1/jobs/{id}/state"};
  }

  rpc ClaimJob(ClaimJobRequest) returns (ClaimJobResponse) {
    option (google.api.http) = {
      post: "/v1/jobs/claim"
      body: "*"
      response_body: "job"
    };
  }
  rpc CompleteJob(CompleteJobRequest) returns (CompleteJobResponse) {
    option (google.api.http) = {
      post: "/v1/jobs/{id}/complete"
      body: "*"
    };
  }
  rpc FailJob(FailJobRequest) returns (FailJobResponse) {
    option (google.api.http) = {
      post: "/v1/jobs/{id}/fail"
      body: "*"
    };
  }
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse) {
    option (google.api.http) = {
      post: "/v1/jobs/{id}/cancel"
      body: "*"
    };
  }
  rpc PromoteJob(PromoteJobRequest) returns (PromoteJobResponse) {
    option (google.api.http) = {
      post: "/v1/jobs/{id}/promote"
      body: "*"
    };
  }
  rpc HeartbeatJob(HeartbeatJobRequest) returns (HeartbeatJobResponse) {
    option (google.api.http) = {
      post: "/v1/jobs/{id}/heartbeat"
      body: "*"
    };
  }
}
