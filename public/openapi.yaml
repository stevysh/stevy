openapi: 3.1.0
info:
  title: Stevy API
  version: 1.0.0
servers:
  - url: https://stevy.example.com
    description: Your Stevy instance
paths:
  /v1/jobs:
    get:
      summary: ListJobs
      operationId: JobService_ListJobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            title: status
        - name: queue
          in: query
          schema:
            type: string
            title: queue
        - name: limit
          in: query
          schema:
            type: integer
            title: limit
            maximum: 1000
            minimum: 1
            format: int32
        - name: offset
          in: query
          schema:
            type: integer
            title: offset
            minimum: 0
            format: int32
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/stevy.v1.Job'
                title: jobs
    post:
      summary: CreateJob
      operationId: JobService_CreateJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/stevy.v1.CreateJobRequest'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                title: job
                $ref: '#/components/schemas/stevy.v1.Job'
  /v1/jobs/statuses:
    get:
      summary: BatchGetJobStatuses
      operationId: JobService_BatchGetJobStatuses
      parameters:
        - name: ids
          in: query
          schema:
            type: array
            items:
              type: string
            title: ids
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/stevy.v1.BatchGetJobStatusesResponse'
  /v1/jobs/{id}:
    get:
      summary: GetJob
      operationId: JobService_GetJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            title: id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                title: job
                $ref: '#/components/schemas/stevy.v1.Job'
